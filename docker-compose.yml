services:
  notebooklm-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: notebooklm-mcp:latest
    container_name: notebooklm-mcp
    restart: unless-stopped

    ports:
      # REST API. The app has no built-in auth â€” see the note at the
      # bottom before routing this anywhere beyond your own network.
      - '${HTTP_PORT:-3000}:3000'
      # noVNC, localhost-only. You only need this once, for the Google
      # login. SSH-tunnel to it (see below) rather than opening it up.
      - '127.0.0.1:6080:6080'

    volumes:
      - notebooklm-data:/data

    env_file:
      - .env

    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

    # --- Optional: put this behind your existing Traefik instead of the
    # published port above. If you enable it: drop the "3000:3000" line,
    # join whatever network Traefik/Coolify actually uses (`docker network
    # ls` to check â€” "coolify" is just a common default), and keep the
    # basicauth middleware since the API doesn't gate requests itself.
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.notebooklm.rule=Host(`notebooklm.ksoftm.com`)
    #   - traefik.http.routers.notebooklm.entrypoints=websecure
    #   - traefik.http.routers.notebooklm.tls.certresolver=letsencrypt
    #   - traefik.http.services.notebooklm.loadbalancer.server.port=3000
    #   - traefik.http.routers.notebooklm.middlewares=notebooklm-auth
    #   - traefik.http.middlewares.notebooklm-auth.basicauth.users=admin:$$apr1$$replace-with-a-real-htpasswd-hash
    # networks:
    #   - coolify

volumes:
  notebooklm-data:
    name: notebooklm-mcp-data

